name: Nightly smoke test

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke test
        run: python3 scripts/update_daily.py --smoke

      - name: File an issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Smoke test failed: a wire service may be down",
              body: [
                "The nightly smoke test (`python3 scripts/update_daily.py --smoke`) failed.",
                "",
                `Run: ${runUrl}`,
                "",
                "One or more feeds or APIs may be unreachable. Check the run logs above."
              ].join("\n")
            });
