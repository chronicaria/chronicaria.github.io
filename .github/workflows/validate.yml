name: Validate data files

on:
  push:
    paths:
      - "league-data/**"
      - "scripts/league_generator.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON
        run: |
          python3 - <<'EOF'
          import json, pathlib, sys
          failed = False
          for p in pathlib.Path("league-data").rglob("*.json"):
              try:
                  json.loads(p.read_text())
                  print(f"ok   {p}")
              except json.JSONDecodeError as e:
                  print(f"FAIL {p}: {e}", file=sys.stderr)
                  failed = True
          sys.exit(1 if failed else 0)
          EOF

      - name: Syntax-check the league generator
        run: python3 -m py_compile scripts/league_generator.py
