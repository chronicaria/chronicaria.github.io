name: Build SMP league site

on:
  push:
    branches: [main]
    paths:
      - "league-data/*.json"
      - "scripts/league_generator.py"
      - "scripts/projections.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-league
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python3 -m pip install --upgrade numpy

      - name: Generate league site from the newest export
        run: |
          # Pick the export that is furthest along, by (season, phase, games played).
          # Games played (len of the completed-games array) only grows over time, so it
          # breaks ties between same-phase exports (e.g. preseason vs day 1, both phase 1)
          # and keeps the day*/playoff*/preseason naming and season rollovers robust.
          NEWEST=$(python3 - <<'PY'
          import glob, json
          best = None
          for p in glob.glob("league-data/*.json"):
              try:
                  data = json.load(open(p))
              except Exception:
                  continue
              ga = data.get("gameAttributes", {})
              if isinstance(ga, list):
                  ga = {x["key"]: x["value"] for x in ga if isinstance(x, dict) and "key" in x}
              season, phase = ga.get("season"), ga.get("phase")
              if not isinstance(season, int):
                  continue
              n_games = len(data.get("games", []))
              key = (season, phase if isinstance(phase, int) else -1, n_games, p)
              if best is None or key > best[0]:
                  best = (key, p)
          print(best[1] if best else "")
          PY
          )
          if [ -z "$NEWEST" ]; then echo "No usable export found"; exit 1; fi
          echo "Building from $NEWEST"
          rm -rf assets games players teams
          rm -f compare.html draft.html free-agency.html history.html index.html records.html schedule.html trade.html
          python3 scripts/league_generator.py "$NEWEST" --out .

      - name: Commit regenerated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets games players teams compare.html draft.html free-agency.html history.html index.html records.html schedule.html trade.html
          # Odds-history ledger (appended by the generator; may not exist yet on old checkouts)
          git add --ignore-errors league-data/odds_history.json || true
          if git diff --cached --quiet; then
            echo "No league changes."
          else
            git commit -m "Regenerate SMP league site [skip ci]"
            git push
          fi
