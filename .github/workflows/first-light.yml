name: First light checklist

# Run this once (manually, from the Actions tab) right after the first push.
# It verifies the site is actually serving and files an issue with the results.

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe the live site
        id: probe
        run: |
          BASE="https://andrewparkus.github.io"
          check() {
            code=$(curl -s -o /dev/null -w "%{http_code}" -L "$BASE$1")
            echo "| \`$1\` | $code |" >> results.md
            [ "$code" = "200" ] || echo "FAIL=$1" >> "$GITHUB_ENV"
          }
          echo "| path | status |" > results.md
          echo "|---|---|" >> results.md
          check /
          check /daily/
          check /daily/elections.html
          check /weather.html
          check /league/
          check /data/daily/latest.json
          check /daily.xml
          check /assets/us-districts.svg
          check /sitemap.xml
          {
            echo "RESULTS<<EOF"
            cat results.md
            echo ""
            echo "Reminders: confirm the four scheduled workflows are enabled (print-daily, update-sports, weather-map, smoke) — GitHub disables crons on forks/inactivity; check Settings → Pages says the site is live."
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: File the checklist issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: process.env.FAIL ? "First light: something is not serving" : "First light: you're live 🎉",
              body: process.env.RESULTS,
            });
