name: Build site

on:
  push:
    branches: [main]
    paths:
      - "day*.json"
      - "basketball_site_generator_v3.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate site from the newest export
        run: python3 basketball_site_generator_v3.py --out docs --clean

      - name: Commit regenerated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No site changes."
          else
            git commit -m "Regenerate site [skip ci]"
            git push
          fi
