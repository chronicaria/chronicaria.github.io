name: Paint the county temperature map

on:
  schedule:
    # Every 3 hours, off-peak minute so GitHub's cron lag stays tolerable.
    - cron: "20 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weather-map
  cancel-in-progress: true

jobs:
  paint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install generator
        run: pip install -e tools/county-temp-map

      - name: Generate the map
        env:
          TEMP_MAP_CACHE: ${{ runner.temp }}/county-temp-cache
        run: python3 scripts/update_weather.py

      - name: Publish if changed
        run: |
          if git diff --quiet assets/weather/ data/weather.json && [ -z "$(git status --porcelain assets/weather/ data/weather.json)" ]; then
            echo "No new map."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/weather/ data/weather.json
          git commit -m "Paint the county temperature map — $(date -u '+%F %H:%MZ')"
          git push
