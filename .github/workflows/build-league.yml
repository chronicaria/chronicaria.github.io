name: Build SMP league site

on:
  push:
    branches: [main]
    paths:
      - "league-data/day*.json"
      - "scripts/league_generator.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-league
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate league site from the newest export
        run: |
          NEWEST=$(ls league-data/day*.json | sort -V | tail -1)
          echo "Building from $NEWEST"
          rm -rf assets games players teams
          rm -f compare.html draft.html free-agency.html history.html index.html records.html schedule.html trade.html
          python3 scripts/league_generator.py "$NEWEST" --out .

      - name: Commit regenerated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets games players teams compare.html draft.html free-agency.html history.html index.html records.html schedule.html trade.html
          if git diff --cached --quiet; then
            echo "No league changes."
          else
            git commit -m "Regenerate SMP league site [skip ci]"
            git push
          fi
